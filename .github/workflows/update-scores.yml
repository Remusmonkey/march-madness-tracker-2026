name: Update Tournament Scores

on:
  schedule:
    # Every 15 min during likely game hours (noon–midnight ET = 16:00–04:59 UTC)
    # Only March and April when tournament runs
    - cron: '*/15 16-23,0-4 * 3-4 *'
  workflow_dispatch: # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch scores from ESPN
        run: python fetch_scores.py

      - name: Commit and push if scores changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          git diff --staged --quiet || git commit -m "Update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
